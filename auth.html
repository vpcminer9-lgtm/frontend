<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VPCMiner - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-200 flex items-center justify-center min-h-screen relative overflow-hidden">
    <div class="absolute w-[500px] h-[500px] bg-blue-500/10 blur-[150px] rounded-full -top-40 -left-40"></div>
    <div class="absolute w-[500px] h-[500px] bg-emerald-500/5 blur-[150px] rounded-full -bottom-40 -right-40"></div>

    <div class="bg-[#131c2e]/80 backdrop-blur-md p-10 rounded-2xl w-full max-w-md border border-slate-800/80 shadow-[0_8px_30px_rgb(0,0,0,0.5)] z-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-wider text-white mb-2">VPC<span class="text-blue-500">Miner</span></h2>
            <p class="text-sm text-slate-400">Entre na sua conta ou crie uma nova para começar</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" class="w-full bg-[#0f1626] border border-slate-800 rounded-xl p-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Senha</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#0f1626] border border-slate-800 rounded-xl p-3 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            </div>
            
            <button onclick="auth('login')" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white py-3.5 rounded-xl font-semibold shadow-lg shadow-blue-600/20 transition duration-300 mt-2">Entrar no Painel</button>
            <button onclick="auth('register')" class="w-full bg-[#1e293b]/50 hover:bg-[#1e293b] border border-slate-800 py-3.5 rounded-xl font-medium text-slate-300 transition duration-300">Criar Nova Conta</button>
        </div>
    </div>

    <script>
        const API = 'https://seu-backend.onrender.com/api';
        const ref = new URLSearchParams(window.location.search).get('ref');

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('Preencha os campos.');

            try {
                const res = await fetch(`${API}/auth/${type}`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ email, password, ref }) 
                });
                const data = await res.json();
                
                if(data.error) return alert(data.error);

                if(data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('role', data.role || 'client');
                    
                    if(data.role === 'admin') {
                        location.href = 'admin.html';
                    } else {
                        location.href = 'index.html';
                    }
                }
            } catch (err) {
                alert('Erro ao processar autenticação.');
            }
        }
    </script>
</body>
</html>
