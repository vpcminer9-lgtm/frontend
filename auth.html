<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VPCMiner - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-200 flex items-center justify-center min-h-screen relative overflow-hidden">
    <div class="absolute w-[500px] h-[500px] bg-blue-500/10 blur-[150px] rounded-full -top-40 -left-40"></div>
    <div class="absolute w-[500px] h-[500px] bg-emerald-500/5 blur-[150px] rounded-full -bottom-40 -right-40"></div>

    <div class="bg-[#131c2e]/80 backdrop-blur-md p-10 rounded-2xl w-full max-w-md border border-slate-800/80 shadow-[0_8px_30px_rgb(0,0,0,0.5)] z-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">VPC<span class="text-blue-500">Miner</span></h2>
            <p class="text-xs text-slate-400 mt-2">Gestão de mineração e estações operacionais</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Palavra-passe</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>

            <div class="pt-2 grid grid-cols-2 gap-3">
                <button onclick="auth('login')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold p-3.5 rounded-xl text-xs transition duration-300">Entrar</button>
                <button onclick="auth('register')" class="w-full bg-[#1e293b] hover:bg-slate-800 text-slate-300 border border-slate-800 font-bold p-3.5 rounded-xl text-xs transition duration-300">Criar Conta</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://blackend-6b0w.onrender.com/api';
        const ref = new URLSearchParams(window.location.search).get('ref');

        // Limpa sessões antigas ao carregar a página de login para evitar tokens corrompidos
        localStorage.clear();

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('Preencha todos os campos.');

            try {
                const res = await fetch(`${API}/auth/${type}`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ email, password, ref }) 
                });
                const data = await res.json();
                
                if(data.error) return alert(data.error);

                if(data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('role', data.role || 'client');
                    
                    // Redirecionamento baseado na role retornada pelo servidor corrigido
                    if(data.role === 'admin') {
                        location.href = 'admin.html';
                    } else {
                        location.href = 'index.html';
                    }
                }
            } catch (err) {
                alert('Erro ao processar a autenticação.');
            }
        }
    </script>
</body>
</html>
