<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VPCMiner - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-200 flex items-center justify-center min-h-screen relative overflow-hidden">
    <div class="absolute w-[500px] h-[500px] bg-blue-500/10 blur-[150px] rounded-full -top-40 -left-40"></div>
    <div class="absolute w-[500px] h-[500px] bg-emerald-500/5 blur-[150px] rounded-full -bottom-40 -right-40"></div>

    <div class="bg-[#131c2e]/80 backdrop-blur-md p-10 rounded-2xl w-full max-w-md border border-slate-800/80 shadow-[0_8px_30px_rgb(0,0,0,0.5)] z-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">VPC<span class="text-blue-500">Miner</span></h2>
            <p class="text-xs text-slate-400 mt-2">Gestão de mineração e estações operacionais</p>
        </div>

        <!-- Tabs -->
        <div class="flex mb-6 bg-[#0a0d14] rounded-xl p-1">
            <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg text-xs font-bold transition bg-blue-600 text-white">Entrar</button>
            <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 rounded-lg text-xs font-bold transition text-slate-400">Criar Conta</button>
        </div>

        <!-- Formulário Login -->
        <div id="formLogin" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Palavra-passe</label>
                <input type="password" id="loginPassword" placeholder="••••••••" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <button onclick="auth('login')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold p-3.5 rounded-xl text-xs transition duration-300 mt-2">Entrar</button>
        </div>

        <!-- Formulário Registro -->
        <div id="formRegister" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" id="regEmail" placeholder="seu@email.com" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Palavra-passe</label>
                <input type="password" id="regPassword" placeholder="••••••••" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">CPF</label>
                <input type="text" id="regCpf" placeholder="000.000.000-00" maxlength="14" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Chave PIX para saques</label>
                <input type="text" id="regPixKey" placeholder="CPF, e-mail, telefone ou chave aleatória" class="w-full bg-[#0a0d14] border border-slate-800 rounded-xl p-3.5 text-sm focus:outline-none focus:border-blue-500 text-white font-medium transition">
            </div>
            <p class="text-[11px] text-slate-500">Seus saques serão enviados para esta chave PIX. Certifique-se que está correta.</p>
            <button onclick="auth('register')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold p-3.5 rounded-xl text-xs transition duration-300">Criar Conta</button>
        </div>
    </div>

    <script>
        const API = 'https://blackend-6b0w.onrender.com/api';
        const ref = new URLSearchParams(window.location.search).get('ref');

        localStorage.clear();

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
            document.getElementById('formRegister').classList.toggle('hidden', isLogin);
            document.getElementById('tabLogin').className = `flex-1 py-2 rounded-lg text-xs font-bold transition ${isLogin ? 'bg-blue-600 text-white' : 'text-slate-400'}`;
            document.getElementById('tabRegister').className = `flex-1 py-2 rounded-lg text-xs font-bold transition ${!isLogin ? 'bg-blue-600 text-white' : 'text-slate-400'}`;
        }

        // Máscara CPF
        document.getElementById('regCpf').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            }
            e.target.value = v;
        });

        async function auth(type) {
            if (type === 'login') {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                if (!email || !password) return alert('Preencha todos os campos.');

                try {
                    const res = await fetch(`${API}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.error) return alert(data.error);
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('userId', data.userId);
                        localStorage.setItem('role', data.role || 'client');
                        location.href = data.role === 'admin' ? 'admin.html' : 'index.html';
                    }
                } catch (err) {
                    alert('Erro ao processar o login.');
                }
            } else {
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                const cpf = document.getElementById('regCpf').value;
                const pix_key = document.getElementById('regPixKey').value;

                if (!email || !password || !cpf || !pix_key) return alert('Preencha todos os campos.');
                if (cpf.replace(/\D/g, '').length !== 11) return alert('CPF inválido. Digite os 11 dígitos.');

                try {
                    const res = await fetch(`${API}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, cpf, pix_key, ref })
                    });
                    const data = await res.json();
                    if (data.error) return alert(data.error);
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('userId', data.userId);
                        localStorage.setItem('role', data.role || 'client');
                        location.href = 'index.html';
                    }
                } catch (err) {
                    alert('Erro ao criar conta.');
                }
            }
        }
    </script>
</body>
</html>
