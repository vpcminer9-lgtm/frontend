<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VPCMiner - Administração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-200 p-6 space-y-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h2 class="text-xl font-bold text-white">Painel de Controle Operacional (Admin)</h2>
            <button onclick="localStorage.clear(); location.href='auth.html';" class="bg-red-950/40 border border-red-900 text-red-400 text-xs px-3 py-1.5 rounded-lg hover:bg-red-900/50 transition">Voltar ao Login</button>
        </div>
        
        <section class="bg-[#131c2e]/40 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-4">
            <h3 class="text-base font-bold text-white">Criar Nova Máquina de Mineração</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="title" placeholder="Nome do Equipamento" class="bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <input type="number" id="price" placeholder="Preço do Custo (R$)" class="bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <input type="number" id="yield" placeholder="Rendimento Diário (%)" class="bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <input type="number" id="duration" placeholder="Duração Total (Dias)" class="bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <input type="file" id="imageFile" class="bg-[#0f1626] border border-slate-800 p-2 rounded-xl text-slate-400 text-xs focus:outline-none">
                <textarea id="description" placeholder="Especificações técnicas rápidas" class="bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none md:col-span-3"></textarea>
            </div>
            <button onclick="createProduct()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm px-6 py-3 rounded-xl transition">Lançar Estação no Catálogo</button>
        </section>
    </div>

    <script>
        const API = 'https://blackend-6b0w.onrender.com/api';
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        // Segurança extra client-side: bloqueia visualização se não for admin
        if (!token || role !== 'admin') {
            alert('Acesso estritamente restrito.');
            localStorage.clear();
            location.href = 'auth.html';
        }

        const getHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        });

        async function loadAdmin() {
            // Requisições administrativas passarão automaticamente pelo middleware `requireAdmin` do backend
            try {
                const resUsers = await fetch(`${API}/admin/users`, { headers: getHeaders() });
                if (resUsers.status === 403) {
                    alert('Sessão administrativa revogada.');
                    location.href = 'auth.html';
                    return;
                }
                // Renderização das tabelas mantida como no seu escopo original...
            } catch (err) {
                console.error("Erro ao puxar dados administrativos.");
            }
        }

        async function createProduct() {
            const title = document.getElementById('title').value;
            const price = parseFloat(document.getElementById('price').value);
            const daily_yield_percent = parseFloat(document.getElementById('yield').value);
            const duration_days = parseInt(document.getElementById('duration').value);
            const description = document.getElementById('description').value;
            const fileInput = document.getElementById('imageFile');

            let image_url = "";
            if (fileInput.files.length > 0) {
                image_url = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            const payload = { title, description, image_url, price, daily_yield_percent, duration_days };

            await fetch(`${API}/admin/products`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify(payload) 
            });
            
            alert('Nova estação lançada com sucesso!');
            location.reload();
        }

        async function actionWithdraw(withdrawalId, action) {
            const res = await fetch(`${API}/admin/withdrawals/action`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify({ withdrawalId, action }) 
            });
            const data = await res.json();
            if(data.error) alert(data.error); else { alert('Ordem atualizada!'); loadAdmin(); }
        }

        async function toggleBlock(userId, isBlocked) {
            await fetch(`${API}/admin/users/block`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify({ userId, isBlocked }) 
            });
            loadAdmin();
        }

        loadAdmin();
    </script>
</body>
</html>
