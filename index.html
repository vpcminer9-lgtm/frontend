<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPCMiner - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen">

    <nav class="bg-[#131c2e]/60 backdrop-blur-md border-b border-slate-800/80 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-xl font-extrabold tracking-wider text-white">VPC<span class="text-blue-500">Miner</span></div>
        <button onclick="localStorage.clear(); location.href='auth.html';" class="bg-[#1e293b] hover:bg-red-950/40 border border-slate-800 text-slate-400 hover:text-red-400 px-4 py-2 rounded-xl text-sm font-medium transition">Sair</button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-[#131c2e]/40 border border-slate-800/80 p-6 rounded-2xl">
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Saldo de Recarga</p>
                <h3 class="text-3xl font-bold text-white mt-1" id="walletBalance">R$ 0,00</h3>
            </div>
            <div class="bg-[#131c2e]/40 border border-slate-800/80 p-6 rounded-2xl">
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Saldo de Rendimentos</p>
                <h3 class="text-3xl font-bold text-emerald-400 mt-1" id="profitBalance">R$ 0,00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-[#131c2e]/40 border border-slate-800/80 p-6 rounded-2xl space-y-4">
                <h4 class="font-bold text-white text-sm">Adicionar Saldo (Pix)</h4>
                <input type="number" id="depAmount" placeholder="Valor (R$)" class="w-full bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <button onclick="deposit()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl font-medium text-sm transition">Gerar Pix</button>
                
                <div id="pixContainer" class="hidden space-y-3 pt-2 border-t border-slate-800/60 text-center">
                    <img id="qrcodeImg" class="mx-auto w-40 h-40 rounded-lg bg-white p-2" src="" alt="QR Code">
                    <p class="text-xs text-slate-400 break-all select-all bg-[#0f1626] p-3 rounded-lg border border-slate-800" id="copiaCola"></p>
                </div>
            </div>

            <div class="bg-[#131c2e]/40 border border-slate-800/80 p-6 rounded-2xl space-y-4">
                <h4 class="font-bold text-white text-sm">Solicitar Retirada</h4>
                <input type="number" id="witAmount" placeholder="Valor (R$)" class="w-full bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <input type="text" id="pixKey" placeholder="Chave PIX (EVP Aleatória)" class="w-full bg-[#0f1626] border border-slate-800 p-3 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                <button onclick="withdraw()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-xl font-medium text-sm transition">Solicitar Saque</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://blackend-6b0w.onrender.com/api';
        const token = localStorage.getItem('token');

        if (!token) {
            location.href = 'auth.html';
        }

        // Configuração global de Headers de Segurança
        const getHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        });

        async function loadDashboard() {
            try {
                // Rota hipotética de carregamento do perfil adaptada para JWT
                const res = await fetch(`${API}/user/profile`, { method: 'GET', headers: getHeaders() });
                if (res.status === 401 || res.status === 403) {
                    localStorage.clear();
                    location.href = 'auth.html';
                    return;
                }
                const data = await res.json();
                if (data) {
                    document.getElementById('walletBalance').innerText = `R$ ${Number(data.wallet_balance).toFixed(2)}`;
                    document.getElementById('profitBalance').innerText = `R$ ${Number(data.profit_balance).toFixed(2)}`;
                }
            } catch (err) {
                console.error("Erro ao carregar dados.");
            }
        }

        async function buyProduct(productId) {
            const res = await fetch(`${API}/invest/purchase`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify({ productId }) 
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else { alert('Ciclo de mineração iniciado!'); loadDashboard(); }
        }

        async function deposit() {
            const amount = document.getElementById('depAmount').value;
            if(!amount) return alert('Digite o valor');
            
            const res = await fetch(`${API}/payments/deposit`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify({ amount: parseFloat(amount) }) 
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('pixContainer').classList.remove('hidden');
                document.getElementById('qrcodeImg').src = `data:image/png;base64,${data.qrCode}`;
                document.getElementById('copiaCola').innerText = data.copyPaste;
            }
        }

        async function withdraw() {
            const amount = document.getElementById('witAmount').value;
            const pixKey = document.getElementById('pixKey').value;
            if(!amount || !pixKey) return alert('Preencha todos os campos');
            
            const res = await fetch(`${API}/withdraw/request`, { 
                method: 'POST', 
                headers: getHeaders(), 
                body: JSON.stringify({ amount: parseFloat(amount), pixKey }) 
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else { alert('Retirada agendada para auditoria admin.'); loadDashboard(); }
        }

        loadDashboard();
    </script>
</body>
</html>
